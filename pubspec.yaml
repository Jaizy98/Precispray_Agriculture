name: precispray
description: "PreciSpray app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  visibility_detector: ^0.4.0
  flutter_animate: ^4.5.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

  # Video playback for transition screen
  video_player: ^2.9.2

  # Map & location (Project A)
  geolocator: ^14.0.3
  permission_handler: ^12.0.3
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Weather API & utilities (Project A)
  http: ^1.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/login_bg.png
    - assets/animation.mp4
    - assets/top_image.png
    - assets/bottom_image.png
    - assets/farm1.jpg
    - assets/farm2.jpg
    - assets/farm3.jpg
    - assets/farm4.jpg